name: Java Learning

on:
  pull_request:
    paths:
      - "learning/java/**"
      - ".github/workflows/java-learning.yml"
  push:
    branches:
      - main
    paths:
      - "learning/java/**"
      - ".github/workflows/java-learning.yml"

jobs:
  java-slice:
    name: ${{ matrix.module }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - toolchain-slice
          - language-essentials-slice

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        working-directory: learning/java/${{ matrix.module }}
        run: mvn test
