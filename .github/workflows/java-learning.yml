name: Java Learning

on:
  pull_request:
    paths:
      - "learning/java/**"
      - ".github/workflows/java-learning.yml"
  push:
    branches:
      - main
    paths:
      - "learning/java/**"
      - ".github/workflows/java-learning.yml"

jobs:
  toolchain-slice:
    name: Toolchain slice tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        working-directory: learning/java/toolchain-slice
        run: mvn test
